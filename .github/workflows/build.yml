name: Build extension zip

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # needed by softprops/action-gh-release on tag pushes

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from manifest
        id: meta
        run: |
          VERSION="$(jq -r .version manifest.json)"
          ZIP_NAME="send-to-me-v${VERSION}.zip"
          echo "version=${VERSION}"  >> "$GITHUB_OUTPUT"
          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"

      - name: Verify manifest is valid and references existing files
        run: |
          set -euo pipefail
          jq -e '.manifest_version == 3' manifest.json > /dev/null \
            || { echo "::error::manifest_version must be 3"; exit 1; }

          # Collect every file the manifest points to and confirm it exists.
          mapfile -t FILES < <(jq -r '
            [
              ((.content_scripts // [])[] | (.js // [])[]),
              ((.content_scripts // [])[] | (.css // [])[]),
              .background.service_worker,
              .action.default_popup,
              .options_ui.page,
              ((.icons // {})              | to_entries[] | .value),
              ((.action.default_icon // {}) | to_entries[] | .value),
              ((.web_accessible_resources // [])[] | (.resources // [])[])
            ] | map(select(. != null)) | unique[]
          ' manifest.json)

          missing=0
          for f in "${FILES[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::Manifest references missing file: $f"
              missing=1
            fi
          done
          [ "$missing" = "0" ]

      - name: Verify tag matches manifest version (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME#v}"   # strip leading 'v'
          if [ "$TAG" != "${{ steps.meta.outputs.version }}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match manifest version ${{ steps.meta.outputs.version }}"
            exit 1
          fi

      - name: Build zip
        run: |
          set -euo pipefail
          mkdir -p dist
          # Only the files the extension actually needs at runtime, plus the
          # license (LGPL requires it to travel with the work).
          zip -r "dist/${{ steps.meta.outputs.zip_name }}" \
            manifest.json \
            background.js \
            popup.html popup.css popup.js \
            options.html options.css options.js \
            qr.html qr.js \
            lib \
            icons \
            LICENSE
          echo
          echo "Contents:"
          unzip -l "dist/${{ steps.meta.outputs.zip_name }}"

      - name: Upload zip as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.zip_name }}
          path: dist/${{ steps.meta.outputs.zip_name }}
          retention-days: 30

      - name: Attach zip to GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ steps.meta.outputs.zip_name }}
          generate_release_notes: true
